<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Dark rounded plate (matches desktop icon background) -->
  <rect width="120" height="120" rx="26" ry="26" fill="#0c0c0e"/>
  <!-- Async "A" mark  outer triangle, white gradient -->
  <defs>
    <linearGradient id="desktop-outer" x1="0" y1="120" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E2E8F0"/>
      <stop offset="0.5" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="desktop-inner" x1="0" y1="120" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#94A3B8"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>
  <!-- Scale the original 24×24 path to fit ~86% of 120px = ~103px, centered -->
  <g transform="translate(8.5, 8.5) scale(4.29)">
    <path d="M12 3L3.5 18.5H8.5L12 12L15.5 18.5H20.5L12 3Z" fill="url(#desktop-outer)"/>
    <circle cx="12" cy="16" r="2" fill="url(#desktop-inner)"/>
  </g>
</svg>
